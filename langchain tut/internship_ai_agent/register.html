<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — InternAI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--cyan:#00f0ff;--violet:#7000ff;--pink:#ff007b;--dark:#080812;--border:rgba(255,255,255,.10)}
  body{font-family:'Outfit',sans-serif;background:var(--dark);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}

  /* ── Ambient Blobs ── */
  .ab{position:fixed;border-radius:50%;filter:blur(110px);animation:ab-sway 20s ease-in-out infinite alternate;pointer-events:none;z-index:0}
  .a1{width:550px;height:550px;background:var(--pink);top:-15%;left:-15%;opacity:.5}
  .a2{width:600px;height:600px;background:var(--cyan);bottom:-20%;right:-15%;opacity:.45;animation-delay:-10s}
  .a3{width:400px;height:400px;background:var(--violet);top:35%;left:35%;opacity:.35;animation-delay:-5s}
  @keyframes ab-sway{0%{transform:translate(0,0) scale(1)}50%{transform:translate(50px,60px) scale(1.08)}100%{transform:translate(-30px,20px) scale(.94)}}

  /* ── Card ── */
  .card{
    position:relative;z-index:1;width:100%;max-width:560px;
    background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.01));
    backdrop-filter:blur(36px) saturate(180%);-webkit-backdrop-filter:blur(36px) saturate(180%);
    border:1px solid rgba(255,255,255,.1);border-top:1px solid rgba(255,255,255,.22);border-left:1px solid rgba(255,255,255,.18);
    box-shadow:0 40px 80px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.04),inset 0 20px 40px rgba(255,255,255,.03);
    border-radius:32px;padding:3rem
  }
  
  /* Top logo bar */
  .brand{display:flex;align-items:center;gap:.5rem;margin-bottom:2rem}
  .brand span{font-size:1.8rem;filter:drop-shadow(0 0 10px var(--cyan))}
  .brand p{font-size:1.1rem;font-weight:800;background:linear-gradient(90deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  
  h3{font-size:1.9rem;font-weight:800;margin-bottom:.3rem}
  .sub{color:rgba(255,255,255,.4);font-size:.92rem;margin-bottom:2.2rem}

  /* Two columns */
  .row2{display:flex;gap:1rem}
  .row2 .field{flex:1}
  
  /* Floating Label Fields */
  .field{position:relative;margin-bottom:1.6rem}
  .field input{
    width:100%;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.08);border-radius:14px;
    padding:1.05rem 1.2rem .4rem;color:#fff;font-size:.97rem;font-family:inherit;
    transition:all .3s ease;outline:none
  }
  .field input:focus{border-color:var(--pink);background:rgba(255,0,123,.05);box-shadow:0 0 18px rgba(255,0,123,.12)}
  .field label{position:absolute;left:1.2rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.35);pointer-events:none;transition:all .3s ease;font-size:.97rem}
  .field input:focus~label,.field input:valid~label{top:.5rem;transform:translateY(0);font-size:.7rem;color:var(--pink)}
  
  /* Password Strength */
  .str-bars{display:flex;gap:5px;margin:-1rem 0 1.4rem}
  .bar{height:4px;flex:1;border-radius:2px;background:rgba(255,255,255,.08);transition:background .3s ease}
  
  /* Terms */
  .terms{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:2rem;font-size:.85rem;color:rgba(255,255,255,.45)}
  .terms input{margin-top:2px;accent-color:var(--pink);flex-shrink:0;cursor:pointer}
  .terms a{color:var(--pink);text-decoration:none}
  
  /* 3D Skeuomorphic Submit Button */
  .submit-btn{
    width:100%;padding:1.15rem;border:none;border-radius:16px;font-family:inherit;font-size:1.1rem;font-weight:700;
    cursor:pointer;position:relative;overflow:hidden;
    background:linear-gradient(180deg,#ff4da6 0%,var(--pink) 100%);
    color:#fff;
    box-shadow:inset 0 2px 3px rgba(255,255,255,.35),inset 0 -5px 8px rgba(0,0,0,.35),0 10px 28px rgba(255,0,123,.4),0 16px 40px rgba(0,0,0,.5);
    transition:all .2s cubic-bezier(.1,.7,1,.1)
  }
  .submit-btn:hover{transform:translateY(-3px);box-shadow:inset 0 2px 3px rgba(255,255,255,.35),0 0 28px rgba(255,0,123,.6),0 14px 36px rgba(255,0,123,.3),0 20px 50px rgba(0,0,0,.6)}
  .submit-btn:active{transform:translateY(6px);box-shadow:inset 0 5px 12px rgba(0,0,0,.5)}
  .shimmer{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s ease}
  .submit-btn:hover .shimmer{left:100%}
  .spin{display:none;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp 1s linear infinite;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  @keyframes sp{to{transform:translate(-50%,-50%) rotate(360deg)}}
  .submit-btn.ld{color:transparent;pointer-events:none}
  .submit-btn.ld .spin{display:block}
  
  .redir{text-align:center;margin-top:1.5rem;font-size:.88rem;color:rgba(255,255,255,.4)}
  .redir a{color:var(--pink);text-decoration:none;font-weight:700;margin-left:.2rem;transition:all .3s}
  .redir a:hover{color:#fff}
</style>
</head>
<body>

<!-- Ambient bg blobs -->
<div class="ab a1"></div>
<div class="ab a2"></div>
<div class="ab a3"></div>

<div class="card">
  <div class="brand">
    <span>🤖</span>
    <p>InternAI</p>
  </div>
  
  <h3>Create Account</h3>
  <div class="sub">Join thousands landing their dream internships with AI.</div>
  
  <form id="rf" onsubmit="go(event)">
    <div class="row2">
      <div class="field">
        <input type="text" id="fn" required autocomplete="off">
        <label for="fn">First Name</label>
      </div>
      <div class="field">
        <input type="text" id="ln" required autocomplete="off">
        <label for="ln">Last Name</label>
      </div>
    </div>
    
    <div class="field">
      <input type="email" id="em" required autocomplete="off">
      <label for="em">Email Address</label>
    </div>
    
    <div class="field" style="margin-bottom:.8rem">
      <input type="password" id="pw" required autocomplete="off" oninput="strength(this.value)">
      <label for="pw">Create Password</label>
    </div>
    
    <div class="str-bars">
      <div class="bar" id="b1"></div>
      <div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div>
    </div>

    <div class="field">
      <input type="text" id="role" required autocomplete="off">
      <label for="role">Target Role (e.g. Frontend Developer)</label>
    </div>
    
    <div class="terms">
      <input type="checkbox" id="tc" required>
      <label for="tc">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>
    
    <button type="submit" class="submit-btn" id="rb">
      Create Account
      <div class="shimmer"></div>
      <div class="spin"></div>
    </button>
  </form>
  
  <div class="redir">Already have an account? <a href="/login">Sign In</a></div>
</div>

<script>
  function strength(v){
    const b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3');
    b1.style.background='rgba(255,255,255,.08)';b2.style.background='rgba(255,255,255,.08)';b3.style.background='rgba(255,255,255,.08)';
    if(v.length>0)b1.style.background='#ff007b';
    if(v.length>5&&/[0-9]/.test(v)){b1.style.background='#f59e0b';b2.style.background='#f59e0b';}
    if(v.length>8&&/[A-Z]/.test(v)&&/[^A-Za-z0-9]/.test(v)){b1.style.background='#00e4b8';b2.style.background='#00e4b8';b3.style.background='#00e4b8';}
  }
  function go(e){
    e.preventDefault();
    const b=document.getElementById('rb');
    b.classList.add('ld');
    setTimeout(()=>{ window.location.href='/user-dashboard'; },1500);
  }
</script>
</body>
</html>
